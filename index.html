<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luv U Na Ka</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0d0d1a, #1a0a2e, #0a1628);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* ===== CUSTOM CURSOR ===== */
    #cursor {
      position: fixed;
      font-size: 1.6rem;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
      animation: cursorSpin 3s linear infinite;
    }
    @keyframes cursorSpin {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* ===== CANVAS ===== */
    #fireworks-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== FLOATING ITEMS ===== */
    .float-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .flower {
      position: absolute;
      animation: floatUp linear forwards;
      opacity: 0;
      user-select: none;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 0.9; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* ===== CORNER DECO ===== */
    .deco-flower {
      position: fixed;
      animation: sway 3s ease-in-out infinite alternate;
      z-index: 1;
      user-select: none;
    }
    .deco-flower:nth-child(1)  { top:3%;   left:2%;   font-size:2.6rem; animation-delay:0s;   }
    .deco-flower:nth-child(2)  { top:8%;   left:9%;   font-size:1.9rem; animation-delay:0.4s; }
    .deco-flower:nth-child(3)  { top:3%;   right:3%;  font-size:2.3rem; animation-delay:0.8s; }
    .deco-flower:nth-child(4)  { top:9%;   right:10%; font-size:1.7rem; animation-delay:1.2s; }
    .deco-flower:nth-child(5)  { bottom:4%;  left:2%;   font-size:2.1rem; animation-delay:0.2s; }
    .deco-flower:nth-child(6)  { bottom:10%; left:11%;  font-size:1.8rem; animation-delay:0.6s; }
    .deco-flower:nth-child(7)  { bottom:4%;  right:2%;  font-size:2.4rem; animation-delay:1s;   }
    .deco-flower:nth-child(8)  { bottom:10%; right:11%; font-size:2rem;   animation-delay:1.4s; }
    .deco-flower:nth-child(9)  { top:44%;  left:1%;   font-size:1.6rem; animation-delay:0.3s; }
    .deco-flower:nth-child(10) { top:44%;  right:1%;  font-size:1.6rem; animation-delay:0.9s; }
    @keyframes sway {
      from { transform: rotate(-18deg) scale(1);   }
      to   { transform: rotate(18deg)  scale(1.2); }
    }

    /* ===== ORBITING HEARTS ===== */
    .orbit-wrap {
      position: relative;
      width: 320px;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .orbit {
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 50%;
      animation: spin linear infinite;
      top: 0; left: 0;
    }
    .orbit:nth-child(1) { animation-duration: 4s; }
    .orbit:nth-child(2) { animation-duration: 6s; animation-direction: reverse; }
    .orbit:nth-child(3) { animation-duration: 8s; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .orbit-dot {
      position: absolute;
      top: -12px; left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      animation: counterSpin linear infinite;
    }
    .orbit:nth-child(1) .orbit-dot { animation-duration: 4s; }
    .orbit:nth-child(2) .orbit-dot { animation-duration: 6s; animation-direction: reverse; }
    .orbit:nth-child(3) .orbit-dot { animation-duration: 8s; }

    @keyframes counterSpin { from { transform: translateX(-50%) rotate(0deg); } to { transform: translateX(-50%) rotate(-360deg); } }

    .orbit:nth-child(1) { width: 200px; height: 200px; top: 60px; left: 60px; }
    .orbit:nth-child(2) { width: 270px; height: 270px; top: 25px; left: 25px; }
    .orbit:nth-child(3) { width: 310px; height: 310px; top: 5px;  left: 5px;  }

    /* ===== LOVE TEXT ===== */
    .love-text {
      position: absolute;
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(90deg, #ff6eb4, #ff9de2, #ffb347, #ff6eb4);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite, pulse 2s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 22px rgba(255,110,180,0.9));
      letter-spacing: 3px;
      text-align: center;
      z-index: 3;
      white-space: nowrap;
    }
    @keyframes shimmer  { 0% { background-position:0% } 100% { background-position:300% } }
    @keyframes pulse    { from { filter: drop-shadow(0 0 12px rgba(255,110,180,0.6)); transform: scale(1); }
                          to   { filter: drop-shadow(0 0 30px rgba(255,110,180,1));   transform: scale(1.06); } }

    /* ===== SPARKLES around text ===== */
    .sparkle {
      position: absolute;
      font-size: 1.2rem;
      animation: sparkleTwinkle 1.5s ease-in-out infinite alternate;
      z-index: 4;
      pointer-events: none;
    }
    @keyframes sparkleTwinkle {
      from { opacity: 0.2; transform: scale(0.6) rotate(0deg); }
      to   { opacity: 1;   transform: scale(1.3) rotate(30deg); }
    }

    /* ===== RAINBOW BUBBLES ===== */
    .bubble {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: bubbleFloat linear forwards;
      opacity: 0;
    }
    @keyframes bubbleFloat {
      0%   { transform: translateY(0) scale(1);   opacity: 0.7; }
      100% { transform: translateY(-100px) scale(1.3); opacity: 0; }
    }

    /* ===== CLICK HEARTS ===== */
    .click-heart {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: heartPop 1.3s ease-out forwards;
      user-select: none;
    }
    @keyframes heartPop {
      0%   { transform: translate(-50%,-50%) scale(0) rotate(-20deg); opacity:1; }
      30%  { transform: translate(-50%,-80%) scale(1.5) rotate(10deg); opacity:1; }
      60%  { transform: translate(-50%,-140%) scale(1) rotate(-5deg);  opacity:0.9; }
      100% { transform: translate(-50%,-240%) scale(0.5) rotate(5deg); opacity:0; }
    }

    /* ===== CURSOR TRAIL ===== */
    .trail {
      position: fixed;
      pointer-events: none;
      z-index: 998;
      font-size: 1rem;
      animation: trailFade 0.7s ease-out forwards;
      transform: translate(-50%,-50%);
    }
    @keyframes trailFade {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%,-80%) scale(0.3); }
    }

    /* ===== SHOOTING STARS ===== */
    .shooting-star {
      position: fixed;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
    }
    .shooting-star::after {
      content: '';
      position: absolute;
      top: 50%; right: 0;
      transform: translateY(-50%);
      width: 80px; height: 1px;
      background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
    }
  </style>
</head>
<body>

  <div id="cursor">💖</div>
  <canvas id="fireworks-canvas"></canvas>

  <!-- Floating flowers -->
  <div class="float-layer" id="floatingFlowers"></div>

  <!-- Corner deco -->
  <div class="float-layer" style="overflow:visible">
    <span class="deco-flower">🌸</span>
    <span class="deco-flower">🌼</span>
    <span class="deco-flower">🌺</span>
    <span class="deco-flower">💐</span>
    <span class="deco-flower">🌹</span>
    <span class="deco-flower">🌷</span>
    <span class="deco-flower">🌻</span>
    <span class="deco-flower">🌸</span>
    <span class="deco-flower">🌼</span>
    <span class="deco-flower">🌺</span>
  </div>

  <!-- Main content -->
  <div class="orbit-wrap" id="orbitWrap">
    <!-- orbits -->
    <div class="orbit"><span class="orbit-dot">💗</span></div>
    <div class="orbit"><span class="orbit-dot">💛</span></div>
    <div class="orbit"><span class="orbit-dot">💜</span></div>

    <!-- sparkles -->
    <span class="sparkle" style="top:10%; left:12%; animation-delay:0s;">✨</span>
    <span class="sparkle" style="top:10%; right:12%; animation-delay:0.5s;">⭐</span>
    <span class="sparkle" style="bottom:10%; left:15%; animation-delay:1s;">✨</span>
    <span class="sparkle" style="bottom:10%; right:15%; animation-delay:0.3s;">💫</span>
    <span class="sparkle" style="top:50%; left:3%;  animation-delay:0.7s;">✨</span>
    <span class="sparkle" style="top:50%; right:3%; animation-delay:1.2s;">⭐</span>

    <!-- love text center -->
    <div class="love-text">💖 LUV U NA KA 💖</div>
  </div>

  <script>
    // ===== CUSTOM CURSOR =====
    const cursor = document.getElementById('cursor');
    const cursorEmojis = ['💖','💗','💓','💝','💕','🩷','❤️‍🔥'];
    let cursorIdx = 0;
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
      spawnTrail(e.clientX, e.clientY);
    });
    setInterval(() => {
      cursor.textContent = cursorEmojis[cursorIdx++ % cursorEmojis.length];
    }, 600);

    // ===== CURSOR TRAIL =====
    const trailEmojis = ['✨','💫','⭐','🌟','💕'];
    let lastTrail = 0;
    function spawnTrail(x, y) {
      const now = Date.now();
      if (now - lastTrail < 80) return;
      lastTrail = now;
      const t = document.createElement('span');
      t.className = 'trail';
      t.textContent = trailEmojis[Math.floor(Math.random() * trailEmojis.length)];
      t.style.left = x + 'px';
      t.style.top  = y + 'px';
      t.style.fontSize = (Math.random() * 0.6 + 0.7) + 'rem';
      document.body.appendChild(t);
      t.addEventListener('animationend', () => t.remove());
    }

    // ===== FIREWORKS =====
    const canvas = document.getElementById('fireworks-canvas');
    const ctx    = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const particles = [], rockets = [];
    const COLORS = ['#ff6eb4','#ffb347','#53d8fb','#a78bfa','#f9f871','#ff6b6b','#b8f7b0','#ffd1dc','#ff9de2','#c3f0ca'];

    class Rocket {
      constructor(x) {
        this.x = x ?? Math.random() * canvas.width;
        this.y = canvas.height;
        this.vy = -(Math.random() * 6 + 9);
        this.vx = (Math.random() - 0.5) * 2.5;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.exploded = false;
        this.targetY  = Math.random() * canvas.height * 0.5 + 60;
        this.trail = [];
      }
      update() {
        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > 10) this.trail.shift();
        this.x += this.vx; this.y += this.vy; this.vy += 0.12;
        if (this.y <= this.targetY && !this.exploded) { this.exploded = true; explode(this.x, this.y, this.color); }
      }
      draw() {
        this.trail.forEach((p, i) => {
          ctx.globalAlpha = i / this.trail.length * 0.5;
          ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
          ctx.fillStyle = this.color; ctx.fill();
        });
        ctx.globalAlpha = 1;
        ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
        ctx.fillStyle = this.color; ctx.shadowBlur = 12; ctx.shadowColor = this.color; ctx.fill(); ctx.shadowBlur = 0;
      }
    }

    class Particle {
      constructor(x, y, color, isHeart) {
        this.x = x; this.y = y; this.color = color;
        this.isHeart = isHeart;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 7 + 1;
        this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
        this.alpha = 1; this.size = Math.random() * 3 + 1.5;
        this.shape = isHeart ? 'heart' : (Math.random() < 0.3 ? 'star' : 'circle');
      }
      update() { this.x += this.vx; this.y += this.vy; this.vy += 0.09; this.vx *= 0.98; this.alpha -= 0.016; }
      draw() {
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.fillStyle = this.color; ctx.shadowBlur = 8; ctx.shadowColor = this.color;
        if (this.shape === 'star')   drawStar(ctx, this.x, this.y, 5, this.size, this.size/2);
        else if (this.shape === 'heart') drawHeart(ctx, this.x, this.y, this.size);
        else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
        ctx.shadowBlur = 0; ctx.globalAlpha = 1;
      }
    }

    function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
      let rot = Math.PI/2*3; const step = Math.PI/spikes;
      ctx.beginPath(); ctx.moveTo(cx, cy-outerR);
      for (let i=0;i<spikes;i++) {
        ctx.lineTo(cx+Math.cos(rot)*outerR, cy+Math.sin(rot)*outerR); rot+=step;
        ctx.lineTo(cx+Math.cos(rot)*innerR, cy+Math.sin(rot)*innerR); rot+=step;
      }
      ctx.lineTo(cx, cy-outerR); ctx.closePath(); ctx.fill();
    }

    function drawHeart(ctx, x, y, size) {
      const s = size * 1.2;
      ctx.beginPath();
      ctx.moveTo(x, y + s * 0.3);
      ctx.bezierCurveTo(x, y, x - s, y, x - s, y + s * 0.4);
      ctx.bezierCurveTo(x - s, y + s, x, y + s * 1.3, x, y + s * 1.6);
      ctx.bezierCurveTo(x, y + s * 1.3, x + s, y + s, x + s, y + s * 0.4);
      ctx.bezierCurveTo(x + s, y, x, y, x, y + s * 0.3);
      ctx.fill();
    }

    function explode(x, y, color) {
      const count = Math.floor(Math.random() * 70) + 80;
      for (let i=0;i<count;i++) {
        const c = Math.random()<0.4 ? COLORS[Math.floor(Math.random()*COLORS.length)] : color;
        const isHeart = Math.random() < 0.2;
        particles.push(new Particle(x, y, c, isHeart));
      }
    }

    setInterval(() => { if (rockets.length < 5) rockets.push(new Rocket()); }, 900);

    function loop() {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i=rockets.length-1;i>=0;i--) { rockets[i].update(); rockets[i].draw(); if (rockets[i].exploded) rockets.splice(i,1); }
      for (let i=particles.length-1;i>=0;i--) { particles[i].update(); particles[i].draw(); if (particles[i].alpha<=0) particles.splice(i,1); }
      requestAnimationFrame(loop);
    }
    loop();

    // ===== CLICK HEARTS =====
    const heartEmojis = ['❤️','🧡','💛','💚','💙','💜','🩷','🩵','🤍','💖','💗','💓','💞','💝','❤️‍🔥','💘','💟'];
    document.addEventListener('click', e => {
      const count = Math.floor(Math.random()*5)+4;
      for (let i=0;i<count;i++) {
        setTimeout(() => {
          const h = document.createElement('span');
          h.className = 'click-heart';
          h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
          h.style.left = (e.clientX + (Math.random()-0.5)*70) + 'px';
          h.style.top  = (e.clientY + (Math.random()-0.5)*40) + 'px';
          h.style.fontSize = (Math.random()*2+1.2)+'rem';
          h.style.animationDuration = (Math.random()*0.5+1)+'s';
          document.body.appendChild(h);
          h.addEventListener('animationend', () => h.remove());
          // mini firework on click
          if (i===0) rockets.push(new Rocket(e.clientX));
        }, i*70);
      }
    });

    // ===== FLOATING FLOWERS + HEARTS =====
    const floatEmojis = ['🌸','🌼','🌺','🌹','🌷','💐','🌻','🪷','💖','💗','💕','🩷','✨','💫','⭐'];
    const container   = document.getElementById('floatingFlowers');
    function spawnFlower() {
      const el = document.createElement('span');
      el.className   = 'flower';
      el.textContent = floatEmojis[Math.floor(Math.random()*floatEmojis.length)];
      el.style.left  = Math.random()*100+'vw';
      el.style.fontSize = (Math.random()*1.6+0.9)+'rem';
      const dur = Math.random()*9+7;
      el.style.animationDuration = dur+'s';
      container.appendChild(el);
      setTimeout(() => el.remove(), dur*1000);
    }
    setInterval(spawnFlower, 500);
    for (let i=0;i<12;i++) setTimeout(spawnFlower, i*200);

    // ===== SHOOTING STARS =====
    function spawnShootingStar() {
      const el = document.createElement('div');
      el.className = 'shooting-star';
      const startX = Math.random() * window.innerWidth;
      const startY = Math.random() * window.innerHeight * 0.5;
      el.style.left = startX + 'px';
      el.style.top  = startY + 'px';
      document.body.appendChild(el);
      const angle = Math.random() * 30 + 20;
      const dist  = Math.random() * 300 + 200;
      el.animate([
        { transform: 'translate(0,0)', opacity: 1 },
        { transform: `translate(${dist}px, ${dist * Math.tan(angle*Math.PI/180)}px)`, opacity: 0 }
      ], { duration: Math.random()*600+400, easing:'ease-in' }).onfinish = () => el.remove();
    }
    setInterval(spawnShootingStar, 1500);

    // ===== AUTO RAINBOW BUBBLES =====
    function spawnBubble() {
      const el = document.createElement('div');
      el.className = 'bubble';
      const size = Math.random()*20+8;
      const hue  = Math.random()*360;
      el.style.width  = size+'px';
      el.style.height = size+'px';
      el.style.left   = Math.random()*100+'vw';
      el.style.bottom = '0';
      el.style.background = `hsla(${hue},100%,70%,0.4)`;
      el.style.border = `1px solid hsla(${hue},100%,90%,0.6)`;
      el.style.boxShadow = `0 0 6px hsla(${hue},100%,70%,0.5)`;
      const dur = Math.random()*2+1.5;
      el.style.animationDuration = dur+'s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), dur*1000);
    }
    setInterval(spawnBubble, 300);
  </script>
</body>
</html>
